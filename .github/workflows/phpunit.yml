name: PHPUnit

on:
  push:
    tags:
      - "*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    environment: main-branch
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --colors=never --log-junit junit.xml --coverage-clover coverage.xml

      - name: Verify Codecov token is available
        run: |
          if [ -z "${{ secrets.CODECOV_TOKEN }}" ]; then
            echo "CODECOV_TOKEN is empty in this workflow context."
            echo "If you stored it as an Environment secret, set 'environment:' on this job or move it to a repository secret."
            exit 1
          fi
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          report_type: coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./junit.xml
          report_type: test_results
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}